<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교수법인 수행가능 나라장터 용역 대시보드</title>
<style>
  :root {
    --bg: #f5f7fb;
    --card: #ffffff;
    --border: #dce3ed;
    --text: #2b3038;
    --muted: #697386;
    --blue: #4b82f0;
    --green: #48ad7d;
    --orange: #f7a13b;
    --red: #e74c3c;
    --purple: #9B59B6;
    --navy: #1d2a44;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    color: var(--text);
    line-height: 1.5;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--navy);
  }
  .header .date {
    font-size: 14px;
    color: var(--muted);
    margin-top: 4px;
  }
  .chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 16px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
  }
  .chip-blue { background: var(--blue); }
  .chip-purple { background: var(--purple); }
  .chip-red { background: var(--red); }
  .chip-navy { background: var(--navy); }

  /* KPI */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--card);
    border-radius: 12px;
    padding: 16px;
    border: 2px solid var(--border);
    text-align: center;
  }
  .kpi-card .value {
    font-size: 22px;
    font-weight: 700;
  }
  .kpi-card .label {
    font-size: 12px;
    color: #555;
    margin-top: 4px;
  }
  .kpi-card.accent-blue { border-color: var(--blue); }
  .kpi-card.accent-purple { border-color: var(--purple); }
  .kpi-card.accent-green { border-color: var(--green); }
  .kpi-card.accent-red { border-color: var(--red); }
  .kpi-card.accent-orange { border-color: var(--orange); }
  .value-blue { color: var(--blue); }
  .value-purple { color: var(--purple); }
  .value-green { color: var(--green); }
  .value-red { color: var(--red); }
  .value-orange { color: var(--orange); }

  /* Main Card */
  .main-card {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-sub {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  /* Bar Chart */
  .chart-area {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }
  .chart-left {
    flex: 2;
    min-width: 300px;
  }
  .chart-right {
    flex: 1;
    min-width: 200px;
    background: #f8fafc;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid var(--border);
  }

  .bar-item {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }
  .bar-label {
    width: 130px;
    font-size: 14px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1;
    height: 18px;
    background: #eff2f6;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.6s ease;
  }
  .bar-count {
    margin-left: 8px;
    font-size: 12px;
    font-weight: 600;
    width: 24px;
    text-align: right;
  }

  /* Pie */
  .pie-section {
    text-align: center;
  }
  .pie-section h4 {
    font-size: 15px;
    margin-bottom: 12px;
    text-align: left;
  }
  .pie-container {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto 12px;
  }
  .pie-canvas {
    width: 140px;
    height: 140px;
    border-radius: 50%;
  }
  .pie-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px;
    font-weight: 700;
    color: var(--purple);
    background: #f8fafc;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pie-legend {
    text-align: left;
    font-size: 13px;
    margin-top: 8px;
  }
  .pie-legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .pie-dot {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* Detail Table */
  .detail-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 2px;
    font-size: 13px;
    margin-top: 8px;
  }
  .detail-table th {
    background: var(--navy);
    color: #fff;
    padding: 8px 10px;
    font-weight: 600;
    text-align: center;
    font-size: 12px;
  }
  .detail-table th:first-child {
    border-radius: 6px 0 0 6px;
  }
  .detail-table th:last-child {
    border-radius: 0 6px 6px 0;
  }
  .detail-table td {
    padding: 6px 10px;
    background: #fbfdff;
    border: 1px solid #eef2f7;
    text-align: center;
    font-size: 12px;
  }
  .detail-table tr:nth-child(even) td {
    background: #f7f9fc;
  }
  .detail-table .cat-header td {
    background: #e3f2fd;
    font-weight: 700;
    border-radius: 4px;
    padding: 6px 10px;
  }
  .detail-table .cat-header.green td { background: #e8f5e9; }
  .detail-table .cat-header.purple td { background: #f3e5f5; }
  .detail-table .cat-header.orange td { background: #fff3e0; }
  .detail-table .subtotal td {
    background: #f0f4fa;
    font-weight: 700;
    color: var(--navy);
  }
  .text-left { text-align: left !important; }
  .text-right { text-align: right !important; }
  .urgent-badge { color: var(--red); font-weight: 700; }
  .price { white-space: nowrap; }

  /* Urgent Section */
  .urgent-card {
    background: var(--card);
    border-radius: 14px;
    padding: 24px;
    border: 2px solid var(--red);
    margin-bottom: 16px;
  }
  .urgent-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .urgent-header h2 { color: var(--red); }
  .urgent-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .urgent-chip {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 14px;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
  }
  .urgent-chip.red { background: var(--red); }
  .urgent-chip.orange { background: var(--orange); }

  .urgent-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 2px;
    font-size: 13px;
    margin-top: 12px;
  }
  .urgent-table th {
    background: var(--navy);
    color: #fff;
    padding: 8px 10px;
    font-weight: 600;
    font-size: 12px;
    text-align: center;
  }
  .urgent-table th:first-child { border-radius: 6px 0 0 6px; }
  .urgent-table th:last-child { border-radius: 0 6px 6px 0; }
  .urgent-table td {
    padding: 6px 10px;
    text-align: center;
    font-size: 12px;
  }
  .urgent-table tr:nth-child(odd) td {
    background: #fff9f9;
    border: 1px solid #fde8e8;
  }
  .urgent-table tr:nth-child(even) td {
    background: #fbfdff;
    border: 1px solid #eef2f7;
  }
  .d-day-0 { color: var(--red); font-weight: 700; }
  .d-day-1 { color: var(--orange); font-weight: 700; }
  .d-day-3 { color: var(--orange); }
  .name-cell { text-align: left !important; }

  .empty-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 15px;
  }

  /* Remark */
  .remark-card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px 24px;
    border: 1px solid #e0e7f0;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .remark-card .icon { font-size: 24px; }
  .remark-card .text { font-size: 13px; color: var(--muted); }
  .remark-card .highlight { color: var(--red); font-weight: 600; }

  /* Footer */
  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 24px 0 8px;
  }

  @media (max-width: 768px) {
    .container { padding: 16px 10px; }
    .kpi-row { grid-template-columns: repeat(3, 1fr); }
    .kpi-card { padding: 10px 6px; }
    .kpi-card .value { font-size: 18px; }
    .bar-label { width: 90px; font-size: 11px; }
    .header h1 { font-size: 20px; }
    .main-card { padding: 14px 10px; }
    .chart-left { min-width: 100%; }
    .chart-right { min-width: 100%; }
    .detail-table, .urgent-table { font-size: 12px; display: block; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
    .detail-table td.name-cell, .urgent-table td.name-cell { white-space: normal; word-break: break-word; min-width: 180px; }
    .name-cell { max-width: 200px; }
  }
  @media (max-width: 480px) {
    .container { padding: 12px 8px; }
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .kpi-card { padding: 8px 4px; }
    .kpi-card .value { font-size: 16px; }
    .kpi-card .label { font-size: 10px; }
    .header h1 { font-size: 17px; }
    .main-card { padding: 10px 8px; }
    .chip { font-size: 11px; padding: 4px 10px; }
    .detail-table, .urgent-table { font-size: 11px; }
    .detail-table td, .urgent-table td { padding: 4px 6px; font-size: 11px; }
    .detail-table th, .urgent-table th { padding: 6px 4px; font-size: 10px; }
    .detail-table td.name-cell, .urgent-table td.name-cell { min-width: 160px; font-size: 11px; }
    .section-title { font-size: 15px; }
  }
</style>
</head>

    [26, "R26BK01541066", "예산군 농촌중심지활성화사업 지역역량강화 용역", "역량강화(교육)", "", "190,000,000원", "2026-06-04 15:00", "[교수법인가능]", "진행중"],

    [28, "R26BK01552255", "농어촌 취약지역 생활여건 개조사업 지역역량강화 용역", "역량강화(교육)", "", "167,000,000원", "2026-06-08 17:00", "[교수법인가능]", "진행중"],
    [29, "R26BK01553318", "논산시 성동면 기초생활거점조성사업 지역역량강화 용역", "역량강화(교육)", "", "135,000,000원", "2026-06-08 17:00", "[교수법인가능]", "진행중"]

</div>

<script>
// ========== 정적 데이터 (BID_DATA from data.js) ==========
// 분류별 색상
const CAT_COLORS = {
  '도시재생': { bg: '#e3f2fd', bar: '#4b82f0', pie: '#4b82f0' },
  '활성화계획': { bg: '#e3f2fd', bar: '#4b82f0', pie: '#4b82f0' },
  '기초생활거점': { bg: '#e8f5e9', bar: '#48ad7d', pie: '#48ad7d' },
  '농촌': { bg: '#e8f5e9', bar: '#48ad7d', pie: '#48ad7d' },
  '취약지역': { bg: '#fff3e0', bar: '#f7a13b', pie: '#f7a13b' },
  '인구감소': { bg: '#f3e5f5', bar: '#9B59B6', pie: '#9B59B6' },
  '역량강화': { bg: '#fce4ec', bar: '#e74c3c', pie: '#e74c3c' },
};
const CAT_ORDER = ['도시재생', '활성화계획', '기초생활거점', '농촌', '취약지역', '인구감소', '역량강화'];
const CAT_LABELS = {
  '도시재생': '도시재생', '활성화계획': '활성화계획', '기초생활거점': '기초생활거점',
  '농촌': '농촌계획', '취약지역': '취약지역생활여건', '인구감소': '인구감소대응', '역량강화': '역량강화(교육)'
};

function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayStr() { return fmtDate(new Date()); }
function parseDate(s) {
  if (!s) return null;
  const d = new Date(s.slice(0, 10));
  return isNaN(d.getTime()) ? null : d;
}
function parsePrice(p) {
  const n = String(p || '').replace(/[^0-9]/g, '');
  return parseInt(n) || 0;
}
function fmtPrice(p) {
  const n = parsePrice(p);
  if (n >= 100000000) return (n / 100000000).toFixed(1) + '억';
  return (n / 10000).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',') + '만원';
}

// ---------- render ----------
function render() {
  const rows = BID_DATA || [];
  const now = new Date();
  const nowStr = fmtDate(now);

  // 1. Header date
  document.getElementById('dateDisplay').textContent = '기준일: ' + nowStr;
  document.getElementById('footerDate').textContent = nowStr;
  document.getElementById('countData').textContent = rows.length + '건 (' + now.toLocaleTimeString('ko-KR') + ' 갱신)';

  // 2. Chips
  const chipsHtml = `
    <span class="chip chip-blue">${rows.length}건 전체</span>
    <span class="chip chip-red">${rows.filter(r => r[6] && parseDate(r[6]) && (parseDate(r[6]) - now) / (86400000) <= 4).length}건 마감임박</span>
    <span class="chip chip-navy">${rows.filter(r => !r[6]).length}건 마감일 미기재</span>
  `;
  document.getElementById('chips').innerHTML = chipsHtml;

  // 3. KPI
  const totalBudget = rows.reduce((s, r) => s + parsePrice(r[5]), 0);
  const budgetStr = fmtPrice(totalBudget);
  const catH = {};
  rows.forEach(r => { catH[r[3]] = (catH[r[3]] || 0) + 1; });
  const topCat = Object.entries(catH).sort((a,b) => b[1]-a[1])[0];
  const deadlineRows = rows.filter(r => r[6] && parseDate(r[6]));

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi-card accent-blue"><div class="value value-blue">${rows.length}건</div><div class="label">전체 용역</div></div>
    <div class="kpi-card accent-purple"><div class="value value-purple">${budgetStr}</div><div class="label">총 예산 규모</div></div>
    <div class="kpi-card accent-green"><div class="value value-green">${Object.keys(catH).length}개</div><div class="label">사업유형</div></div>
    <div class="kpi-card accent-orange"><div class="value value-orange">${deadlineRows.length}건</div><div class="label">마감일 기재</div></div>
    <div class="kpi-card accent-red"><div class="value value-red">${topCat ? topCat[1] + '건' : '0건'}</div><div class="label">최다: ${CAT_LABELS[topCat[0]] || topCat[0]}</div></div>
  `;

  // 4. Bar Chart
  const catCounts = {};
  rows.forEach(r => {
    const c = r[3];
    if (!catCounts[c]) catCounts[c] = 0;
    catCounts[c]++;
  });
  const maxCount = Math.max(...Object.values(catCounts), 1);

  let barHtml = '';
  CAT_ORDER.forEach(c => {
    if (!catCounts[c]) return;
    const cnt = catCounts[c];
    const pct = (cnt / maxCount * 100).toFixed(0);
    const col = CAT_COLORS[c] || { bar: '#4b82f0' };
    barHtml += `
      <div class="bar-item">
        <span class="bar-label">${CAT_LABELS[c] || c}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col.bar}"></div></div>
        <span class="bar-count">${cnt}</span>
      </div>`;
  });
  document.getElementById('barChart').innerHTML = barHtml;

  // 5. Pie Chart
  const pieData = CAT_ORDER.filter(c => catCounts[c]).map((c, i) => ({
    label: CAT_LABELS[c] || c,
    value: catCounts[c],
    color: (CAT_COLORS[c] || {}).pie || '#ccc'
  }));
  const totalPie = rows.length;
  const pieColors = pieData.map(d => d.color).join(',');
  const piePcts = pieData.map(d => (d.value / totalPie * 100).toFixed(1)).join('% ') + '%';

  // conic-gradient pie
  let conicParts = [];
  let acc = 0;
  pieData.forEach(d => {
    const pct = d.value / totalPie * 100;
    const start = acc;
    const end = acc + pct;
    conicParts.push(`${d.color} ${start}% ${end}%`);
    acc = end;
  });
  const conicStr = conicParts.join(', ');

  let pieHtml = `<div class="pie-section"><h4>사업유형 비율</h4>
    <div class="pie-container">
      <div class="pie-canvas" style="background: conic-gradient(${conicStr})"></div>
      <div class="pie-center">${totalPie}</div>
    </div>
    <div class="pie-legend">`;
  pieData.forEach(d => {
    pieHtml += `<div class="pie-legend-item"><span class="pie-dot" style="background:${d.color}"></span>${d.label} (${d.value})</div>`;
  });
  pieHtml += '</div></div>';
  document.getElementById('pieChart').innerHTML = pieHtml;

  // 6. Detail Table
  const CAT_RENDER_ORDER = ['도시재생', '활성화계획', '기초생활거점', '농촌', '취약지역', '인구감소', '역량강화'];
  const CAT_RENDER_LABEL = {
    '도시재생': '도시재생', '활성화계획': '활성화계획',
    '기초생활거점': '기초생활거점', '농촌': '농촌계획',
    '취약지역': '취약지역생활여건', '인구감소': '인구감소대응',
    '역량강화': '역량강화(교육)'
  };
  const CAT_ROW_BG = {
    '도시재생': '', '활성화계획': '',
    '기초생활거점': 'green', '농촌': 'green',
    '취약지역': 'orange', '인구감소': 'purple',
    '역량강화': ''
  };

  let tblHtml = `<tr><th>순번</th><th>공고명</th><th>예산</th><th>마감일</th><th>비고</th></tr>`;
  CAT_RENDER_ORDER.forEach(cat => {
    const items = rows.filter(r => r[3] === cat);
    if (items.length === 0) return;
    const bgClass = CAT_ROW_BG[cat] || '';
    const catSum = items.reduce((s, r) => s + parsePrice(r[5]), 0);
    const catSumStr = fmtPrice(catSum);
    tblHtml += `<tr class="cat-header ${bgClass}"><td colspan="5">📌 ${CAT_RENDER_LABEL[cat] || cat} (${items.length}건 / ${catSumStr})</td></tr>`;
    items.forEach(r => {
      const deadlineStyle = r[6] && parseDate(r[6]) ? `D-${Math.ceil((parseDate(r[6]) - now) / 86400000)}` : '-';
      const styleHtml = r[6] && parseDate(r[6]) && (parseDate(r[6]) - now) / 86400000 <= 3 ? ' class="urgent-badge"' : '';
      tblHtml += `<tr>
        <td>${r[0]}</td>
        <td class="name-cell">${r[2]}</td>
        <td class="price">${fmtPrice(r[5])}</td>
        <td${styleHtml}>${r[6] || '-'}</td>
        <td>${r[7] || ''}</td>
      </tr>`;
    });
    tblHtml += `<tr class="subtotal"><td colspan="2" class="text-right">${CAT_RENDER_LABEL[cat] || cat} 소계</td><td class="price">${fmtPrice(catSum)}</td><td></td><td>${items.length}건</td></tr>`;
  });

  document.getElementById('detailTable').innerHTML = tblHtml;

  // 7. Urgent section
  const urgent = rows.filter(r => r[6] && parseDate(r[6]) && (parseDate(r[6]) - now) / 86400000 <= 6)
    .sort((a, b) => (parseDate(a[6]) || new Date()) - (parseDate(b[6]) || new Date()));

  if (urgent.length > 0) {
    document.getElementById('urgentSub').textContent = `${urgent.length}건의 용역이 7일 이내 마감 예정입니다.`;
    document.getElementById('urgentChips').innerHTML = `
      <span class="urgent-chip red">${urgent.filter(r => parseDate(r[6]) && (parseDate(r[6]) - now) / 86400000 <= 1).length}건 D-0</span>
      <span class="urgent-chip orange">${urgent.filter(r => parseDate(r[6]) && (parseDate(r[6]) - now) / 86400000 > 1).length}건 D-${Math.min(6, ...urgent.filter(r => !r[6] || isNaN(parseDate(r[6])) ? 99 : (parseDate(r[6]) - now) / 86400000).filter(d => !isNaN(d)).map(d => Math.ceil(d)))}</span>
    `;

    let urgHtml = `<table class="urgent-table">
      <tr><th>순번</th><th>공고명</th><th>예산</th><th>마감일</th><th>D-Day</th><th>비고</th></tr>`;
    urgent.forEach(r => {
      const d = parseDate(r[6]);
      const dDay = Math.ceil((d - now) / 86400000);
      const dClass = dDay <= 0 ? 'd-day-0' : dDay <= 1 ? 'd-day-1' : dDay <= 3 ? 'd-day-3' : '';
      urgHtml += `<tr>
        <td>${r[0]}</td>
        <td class="name-cell">${r[2]}</td>
        <td class="price">${fmtPrice(r[5])}</td>
        <td>${r[6]}</td>
        <td class="${dClass}">D-${dDay}</td>
        <td>${r[7] || ''}</td>
      </tr>`;
    });
    urgHtml += '</table>';
    document.getElementById('urgentTableArea').innerHTML = urgHtml;
  } else {
    document.getElementById('urgentSub').textContent = '7일 이내 마감 예정 용역이 없습니다.';
    document.getElementById('urgentChips').innerHTML = '';
    document.getElementById('urgentTableArea').innerHTML = '<div class="empty-msg">✅ 마감임박 용역 없음</div>';
  }
}

render();
</script>

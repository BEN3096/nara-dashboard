<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>도시재생 용역 대시보드</title>
  <style>
    :root {
      --bg: #eef3f6;
      --panel: #ffffff;
      --panel-soft: #f8fbfa;
      --line: #dfe9e7;
      --line-strong: #c8d8d5;
      --text: #1f2e33;
      --muted: #6e7f86;
      --navy: #1f3d4a;
      --teal: #1c8a7a;
      --mint: #dff3ee;
      --green: #3d9a69;
      --amber: #d58b25;
      --red: #c95252;
      --blue: #3f78a8;
      --shadow: 0 14px 40px rgba(31, 61, 74, .10);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, #f6faf9 0%, var(--bg) 320px, #edf3f2 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
      line-height: 1.45;
      letter-spacing: 0;
    }

    button, input, select {
      font: inherit;
    }

    .shell {
      width: min(1440px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .title h1 {
      margin: 0;
      color: var(--navy);
      font-size: 30px;
      font-weight: 800;
      line-height: 1.16;
    }

    .title p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, .82);
      color: var(--navy);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill.good { background: var(--mint); color: #106b5d; border-color: #bfe4dc; }
    .pill.warn { background: #fff2dd; color: #8a5715; border-color: #ecd5ac; }
    .pill.red { background: #fdeaea; color: #9c3535; border-color: #edc4c4; }
    .pill.blue { background: #e7f1fa; color: #2f628d; border-color: #c8dced; }

    .kpis {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .kpi {
      min-height: 112px;
      padding: 16px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .92);
      border: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(31, 61, 74, .06);
    }

    .kpi .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .kpi .value {
      margin-top: 8px;
      color: var(--navy);
      font-size: 27px;
      line-height: 1;
      font-weight: 850;
    }

    .kpi .sub {
      margin-top: 9px;
      color: var(--muted);
      font-size: 12px;
    }

    .kpi.primary {
      background: linear-gradient(180deg, #ffffff 0%, #effaf6 100%);
      border-color: #bfe4dc;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.6fr repeat(4, minmax(150px, .7fr));
      gap: 10px;
      margin: 16px 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 255, 255, .76);
      box-shadow: var(--shadow);
    }

    .control {
      width: 100%;
      height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      padding: 0 14px;
      outline: none;
    }

    .control:focus {
      border-color: #83c9bc;
      box-shadow: 0 0 0 4px rgba(28, 138, 122, .12);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, .94);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbfa 100%);
    }

    .panel-title {
      margin: 0;
      color: var(--navy);
      font-size: 17px;
      font-weight: 850;
    }

    .panel-sub {
      color: var(--muted);
      font-size: 13px;
    }

    .list {
      padding: 10px;
    }

    .item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px 130px 110px;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid transparent;
      border-radius: 18px;
      background: #fff;
    }

    .item + .item {
      margin-top: 8px;
    }

    .item:hover {
      border-color: #bfe4dc;
      background: #fbfefd;
    }

    .item-title {
      display: flex;
      gap: 9px;
      align-items: flex-start;
      min-width: 0;
    }

    .rank {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--mint);
      color: var(--teal);
      font-size: 13px;
      font-weight: 850;
    }

    .name {
      margin: 0;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.35;
    }

    .meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 7px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #f0f5f4;
      color: #526970;
      font-size: 11px;
      font-weight: 700;
    }

    .cell-label {
      display: none;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .money, .deadline, .docs {
      color: var(--navy);
      font-size: 13px;
      font-weight: 800;
    }

    .deadline small, .docs small, .money small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
    }

    .judge {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-width: 78px;
      min-height: 32px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 850;
      border: 1px solid var(--line);
    }

    .judge.good { background: var(--mint); color: #106b5d; border-color: #bfe4dc; }
    .judge.conditional { background: #fff2dd; color: #8a5715; border-color: #ecd5ac; }
    .judge.review { background: #eef2f7; color: #55636a; }

    .open-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 29px;
      margin-top: 7px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #c8dced;
      background: #f2f8fd;
      color: #2f628d;
      font-size: 12px;
      font-weight: 850;
      text-decoration: none;
    }

    .open-link:hover {
      background: #e7f1fa;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 7px;
    }

    .summary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 29px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #bfe4dc;
      background: var(--mint);
      color: #106b5d;
      font-size: 12px;
      font-weight: 850;
      cursor: pointer;
    }

    .summary-button:hover {
      background: #d1eee7;
    }

    .summary-slot {
      display: none;
      grid-column: 1 / -1;
      margin-top: 4px;
    }

    .item.open .summary-slot {
      display: block;
    }

    .summary-panel {
      padding: 18px;
      border: 1px solid #cfe5e1;
      border-radius: 18px;
      background: #fbfefd;
    }

    .summary-panel h4 {
      margin: 0;
      color: var(--navy);
      font-size: 15px;
      font-weight: 850;
    }

    .summary-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }

    .summary-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .summary-sections {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
    }

    .summary-section {
      padding-left: 12px;
      border-left: 3px solid #bfe4dc;
    }

    .summary-section h5 {
      margin: 0 0 7px;
      color: var(--navy);
      font-size: 13px;
      font-weight: 850;
    }

    .summary-section ul {
      display: grid;
      gap: 5px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .summary-section li {
      color: #354b52;
      font-size: 13px;
      font-weight: 650;
      line-height: 1.55;
    }

    .summary-section li::before {
      content: "";
      display: inline-block;
      width: 5px;
      height: 5px;
      margin: 0 7px 2px 0;
      border-radius: 999px;
      background: var(--teal);
    }

    .attachment-grid {
      display: grid;
      gap: 8px;
    }

    .attachment details {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      overflow: hidden;
    }

    .attachment summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 12px;
      color: var(--navy);
      font-size: 12px;
      font-weight: 850;
      cursor: pointer;
    }

    .attachment summary::-webkit-details-marker {
      display: none;
    }

    .attachment-meta {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .attachment-body {
      padding: 0 12px 12px;
      color: #4d6269;
      font-size: 13px;
    }

    .attachment-body ul {
      margin: 0 0 10px;
      padding-left: 18px;
      line-height: 1.55;
    }

    .attachment-preview {
      max-height: 360px;
      overflow: auto;
      white-space: pre-wrap;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fcfdfc;
      color: #2d4148;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.72;
    }

    .summary-empty {
      padding: 12px;
      border-radius: 14px;
      background: #fff7f7;
      border: 1px solid #efd1d1;
      color: #7d3b3b;
      font-size: 12px;
      font-weight: 800;
    }

    .side {
      display: grid;
      gap: 16px;
    }

    .side-card {
      padding: 18px;
      background: rgba(255, 255, 255, .94);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .side-card h2 {
      margin: 0 0 12px;
      color: var(--navy);
      font-size: 16px;
      font-weight: 850;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr) 40px;
      gap: 9px;
      align-items: center;
      margin: 9px 0;
      font-size: 12px;
    }

    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: #e9f0ef;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--teal);
    }

    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .mini {
      padding: 12px;
      border-radius: 16px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
    }

    .mini strong {
      display: block;
      color: var(--navy);
      font-size: 18px;
      line-height: 1;
    }

    .mini span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .error-list {
      display: grid;
      gap: 8px;
    }

    .error {
      padding: 11px 12px;
      border: 1px solid #efd1d1;
      border-radius: 16px;
      background: #fff7f7;
      color: #7d3b3b;
      font-size: 12px;
      font-weight: 700;
    }

    .empty {
      padding: 42px 20px;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 1180px) {
      .kpis { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .layout { grid-template-columns: 1fr; }
      .side { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 760px) {
      .shell {
        width: min(100vw - 24px, 1440px);
        padding-top: 18px;
      }

      .topbar {
        display: block;
      }

      .status-strip {
        justify-content: flex-start;
        margin-top: 12px;
      }

      .title h1 { font-size: 24px; }
      .kpis { grid-template-columns: 1fr 1fr; }
      .toolbar { grid-template-columns: 1fr; border-radius: 18px; }
      .side { grid-template-columns: 1fr; }

      .item {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .cell-label {
        display: block;
        margin-bottom: 2px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="title">
        <h1>도시재생 용역 대시보드</h1>
        <p id="subtitle">나라장터 v4 수집·첨부·문서 인식 결과를 불러오는 중입니다.</p>
      </div>
      <div class="status-strip">
        <span class="pill good">v4 프로세스</span>
        <span class="pill blue">윈도우 수집/OCR</span>
        <span class="pill warn" id="dashboardState">대시보드 반영 확인중</span>
      </div>
    </header>

    <section class="kpis" id="kpis"></section>

    <section class="toolbar" aria-label="검색 및 필터">
      <input class="control" id="search" type="search" placeholder="공고명, 기관, 지역, 공고번호 검색">
      <select class="control" id="judgeFilter">
        <option value="">전체 판정</option>
        <option value="적합">참여가능</option>
        <option value="조건부">조건부</option>
        <option value="검토">검토</option>
      </select>
      <select class="control" id="categoryFilter">
        <option value="">전체 분류</option>
      </select>
      <select class="control" id="docFilter">
        <option value="">전체 문서상태</option>
        <option value="ok">문서 인식 완료</option>
        <option value="review">추가 검토 있음</option>
        <option value="error">첨부 오류</option>
      </select>
      <select class="control" id="sortMode">
        <option value="priority">우선순위순</option>
        <option value="deadline">마감 임박순</option>
        <option value="budget">금액순</option>
        <option value="docs">문서 많은순</option>
      </select>
    </section>

    <section class="layout">
      <section class="panel">
        <div class="panel-head">
          <div>
            <h2 class="panel-title">진행중 후보</h2>
            <div class="panel-sub" id="resultCount">0건 표시</div>
          </div>
          <span class="pill good" id="topBadge">우선순위</span>
        </div>
        <div class="list" id="itemList"></div>
      </section>

      <aside class="side">
        <section class="side-card">
          <h2>문서 인식</h2>
          <div class="mini-grid" id="docStats"></div>
        </section>

        <section class="side-card">
          <h2>분류 현황</h2>
          <div id="categoryBars"></div>
        </section>

        <section class="side-card">
          <h2>판정 현황</h2>
          <div id="judgeBars"></div>
        </section>

        <section class="side-card">
          <h2>첨부 확인 필요</h2>
          <div class="error-list" id="errorList"></div>
        </section>
      </aside>
    </section>

    <p class="footer-note">데이터 기준: <span id="generatedAt">-</span> · v4 대시보드 직전 병합본 기반</p>
  </main>

  <script>
    const state = {
      data: null,
      summaries: {},
      items: [],
      filtered: []
    };

    const money = value => {
      const n = Number(String(value || "").replace(/[^0-9.-]/g, ""));
      if (!Number.isFinite(n) || n <= 0) return "-";
      if (n >= 100000000) return `${(n / 100000000).toFixed(1)}억`;
      if (n >= 10000) return `${Math.round(n / 10000).toLocaleString("ko-KR")}만`;
      return n.toLocaleString("ko-KR");
    };

    const number = value => Number(value || 0).toLocaleString("ko-KR");

    const escapeHtml = value => String(value ?? "").replace(/[&<>"']/g, char => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      "\"": "&quot;",
      "'": "&#039;"
    }[char]));

    const daysLeft = deadline => {
      if (!deadline) return null;
      const end = new Date(deadline);
      if (Number.isNaN(end.getTime())) return null;
      return Math.ceil((end - new Date()) / (1000 * 60 * 60 * 24));
    };

    const deadlineText = item => {
      const d = item.deadline_text || "";
      const left = daysLeft(item.deadline);
      if (left === null) return { main: d || "확인 필요", sub: "마감일 확인" };
      if (left < 0) return { main: d, sub: "마감 지남" };
      if (left === 0) return { main: d, sub: "오늘 마감" };
      return { main: d, sub: `${left}일 남음` };
    };

    const judgeClass = judgment => {
      const text = String(judgment || "");
      if (text.includes("적합") && !text.includes("조건부")) return "good";
      if (text.includes("조건부")) return "conditional";
      return "review";
    };

    const displayJudge = judgment => {
      const text = String(judgment || "검토");
      if (text === "적합") return "참여가능";
      return text;
    };

    const docStatus = item => {
      const st = item.attachment_status || {};
      if (st.error) return "error";
      if ((st.documents_needs_review || 0) > 0) return "review";
      return "ok";
    };

    function renderKpis(summary) {
      const kpis = [
        ["진행중 후보", summary.active_candidates, "현재 마감 전 후보", "primary"],
        ["참여가능", summary.likely_eligible, "메타데이터 기준 적합", ""],
        ["조건부", summary.conditional, "첨부/조건 확인 대상", ""],
        ["첨부 처리", summary.attachment_with_downloads, `${summary.attachment_processed}건 중`, ""],
        ["문서 인식", summary.documents_extract_ok, `${summary.documents_extracted}개 문서`, ""],
        ["검토 예산", money(summary.review_budget), "후보 총액", ""]
      ];

      document.getElementById("kpis").innerHTML = kpis.map(([label, value, sub, cls]) => `
        <article class="kpi ${cls}">
          <div class="label">${label}</div>
          <div class="value">${typeof value === "number" ? number(value) : value}</div>
          <div class="sub">${sub}</div>
        </article>
      `).join("");
    }

    function countBy(items, fn) {
      return items.reduce((acc, item) => {
        const key = fn(item) || "기타";
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});
    }

    function renderBars(targetId, counts, color = "var(--teal)") {
      const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 8);
      const max = Math.max(1, ...entries.map(([, v]) => v));
      document.getElementById(targetId).innerHTML = entries.map(([label, value]) => `
        <div class="bar-row">
          <div title="${escapeHtml(label)}">${escapeHtml(label.length > 8 ? label.slice(0, 8) + "…" : label)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.max(8, value / max * 100)}%; background:${color}"></div></div>
          <strong>${number(value)}</strong>
        </div>
      `).join("");
    }

    function renderSide(data, items) {
      const summary = data.summary || {};
      document.getElementById("docStats").innerHTML = `
        <div class="mini"><strong>${number(summary.documents_extracted)}</strong><span>추출 문서</span></div>
        <div class="mini"><strong>${number(summary.documents_extract_ok)}</strong><span>인식 성공</span></div>
        <div class="mini"><strong>${number(summary.documents_needs_review)}</strong><span>추가 검토</span></div>
        <div class="mini"><strong>${number(summary.attachment_errors)}</strong><span>첨부 오류</span></div>
      `;

      renderBars("categoryBars", countBy(items, item => item.category), "var(--teal)");
      renderBars("judgeBars", countBy(items, item => displayJudge(item.auto_judge?.judgment)), "var(--blue)");

      const errors = data.attachment_errors || [];
      document.getElementById("errorList").innerHTML = errors.length ? errors.map(error => `
        <div class="error">
          <div>${escapeHtml(error.bid_no || "-")}</div>
          <div>${escapeHtml(error.name || "-")}</div>
        </div>
      `).join("") : `<div class="mini"><strong>0</strong><span>첨부 오류 없음</span></div>`;
    }

    function populateFilters(items) {
      const categorySelect = document.getElementById("categoryFilter");
      const categories = [...new Set(items.map(item => item.category).filter(Boolean))].sort();
      categorySelect.innerHTML = `<option value="">전체 분류</option>` + categories.map(cat => `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`).join("");
    }

    function applyFilters() {
      const search = document.getElementById("search").value.trim().toLowerCase();
      const judge = document.getElementById("judgeFilter").value;
      const category = document.getElementById("categoryFilter").value;
      const doc = document.getElementById("docFilter").value;
      const sort = document.getElementById("sortMode").value;

      let items = [...state.items];
      if (search) {
        items = items.filter(item => [
          item.name, item.agency, item.demand_agency, item.region_limit, item.bid_no, item.category,
          ...(item.matched_terms || [])
        ].join(" ").toLowerCase().includes(search));
      }
      if (judge) items = items.filter(item => String(item.auto_judge?.judgment || "").includes(judge));
      if (category) items = items.filter(item => item.category === category);
      if (doc) items = items.filter(item => docStatus(item) === doc);

      items.sort((a, b) => {
        if (sort === "deadline") return new Date(a.deadline || "2999") - new Date(b.deadline || "2999");
        if (sort === "budget") return Number(b.budget || 0) - Number(a.budget || 0);
        if (sort === "docs") return Number(b.attachment_status?.documents_extracted || 0) - Number(a.attachment_status?.documents_extracted || 0);
        return Number(b.detail_priority || 0) - Number(a.detail_priority || 0);
      });

      state.filtered = items;
      renderList(items);
    }

    function renderList(items) {
      const list = document.getElementById("itemList");
      document.getElementById("resultCount").textContent = `${number(items.length)}건 표시 · 전체 ${number(state.items.length)}건`;
      if (!items.length) {
        list.innerHTML = `<div class="empty">조건에 맞는 후보가 없습니다.</div>`;
        return;
      }

      list.innerHTML = items.map((item, idx) => {
        const judgment = item.auto_judge?.judgment || "검토";
        const deadline = deadlineText(item);
        const docs = item.attachment_status || {};
        const terms = (item.matched_terms || []).slice(0, 4);
        const sourceUrl = item.url ? `<a class="open-link" href="${escapeHtml(item.url)}" target="_blank" rel="noopener">나라장터 원문</a>` : "";
        const hasSummary = Boolean(state.summaries[item.uid]);
        const summaryButton = `<button class="summary-button" type="button" data-summary-uid="${escapeHtml(item.uid)}">${hasSummary ? "첨부 요약" : "요약 없음"}</button>`;
        return `
          <article class="item" data-item-uid="${escapeHtml(item.uid)}">
            <div class="item-title">
              <span class="rank">${idx + 1}</span>
              <div>
                <h3 class="name">${escapeHtml(item.name || "-")}</h3>
                <div class="meta">${escapeHtml(item.agency || "-")} · ${escapeHtml(item.bid_no || "-")}</div>
                <div class="tags">
                  <span class="tag">${escapeHtml(item.category || "분류 없음")}</span>
                  <span class="tag">${escapeHtml(item.region_limit || "지역 제한 없음")}</span>
                  ${terms.map(term => `<span class="tag">${escapeHtml(term)}</span>`).join("")}
                </div>
                <div class="action-row">
                  ${sourceUrl}
                  ${summaryButton}
                </div>
              </div>
            </div>
            <div class="deadline">
              <span class="cell-label">마감</span>
              ${escapeHtml(deadline.main || "-")}
              <small>${escapeHtml(deadline.sub)}</small>
            </div>
            <div class="money">
              <span class="cell-label">금액</span>
              ${money(item.budget)}
              <small>${escapeHtml(item.method || "계약방식 확인")}</small>
            </div>
            <div>
              <span class="cell-label">판정/문서</span>
              <span class="judge ${judgeClass(judgment)}">${escapeHtml(displayJudge(judgment))}</span>
              <div class="docs">
                <small>${number(docs.documents_extract_ok || 0)}/${number(docs.documents_extracted || 0)} 문서 인식</small>
              </div>
            </div>
            <div class="summary-slot" data-summary-slot="${escapeHtml(item.uid)}"></div>
          </article>
        `;
      }).join("");
    }

    function renderSummary(uid) {
      const summary = state.summaries[uid];
      if (!summary) {
        return `<div class="summary-empty">이 공고는 첨부 요약 데이터가 아직 없습니다.</div>`;
      }

      const docs = summary.documents || [];
      const sections = summary.sections || [];
      const points = (summary.key_points || []).slice(0, 8);
      const renderedSections = sections.length ? sections.map(section => `
        <section class="summary-section">
          <h5>${escapeHtml(section.title || "요약")}</h5>
          <ul>
            ${(section.items || []).length ? section.items.map(item => `<li>${escapeHtml(item)}</li>`).join("") : `<li>확인된 내용이 없습니다.</li>`}
          </ul>
        </section>
      `).join("") : `
        <section class="summary-section">
          <h5>핵심 요약</h5>
          <ul>
            ${points.length ? points.map(point => `<li>${escapeHtml(point)}</li>`).join("") : `<li>핵심 조건을 자동 추출하지 못했습니다. 아래 첨부파일 본문을 확인해주세요.</li>`}
          </ul>
        </section>
      `;

      return `
        <div class="summary-panel">
          <div class="summary-head">
            <h4>${escapeHtml(summary.summary_title || "첨부 요약")}</h4>
            <span class="summary-meta">${escapeHtml(summary.summary_meta || `${number(summary.document_count || docs.length)}개 첨부`)}</span>
          </div>
          <div class="summary-sections">${renderedSections}</div>
          <h4>첨부파일</h4>
          <div class="attachment-grid">
            ${docs.length ? docs.map((doc, index) => `
              <div class="attachment">
                <details>
                  <summary>
                    <span>${index + 1}. ${escapeHtml(doc.name || "첨부문서")}</span>
                    <span class="attachment-meta">${escapeHtml(doc.kind || "첨부문서")} · ${number(doc.text_chars || 0)}자</span>
                  </summary>
                  <div class="attachment-body">
                    ${(doc.summary || []).length ? `<ul>${doc.summary.map(line => `<li>${escapeHtml(line)}</li>`).join("")}</ul>` : ""}
                    <div class="attachment-preview">${escapeHtml(doc.preview || "추출 본문이 없습니다.")}</div>
                  </div>
                </details>
              </div>
            `).join("") : `<div class="summary-empty">표시할 첨부파일이 없습니다.</div>`}
          </div>
        </div>
      `;
    }

    function toggleSummary(uid) {
      const item = document.querySelector(`[data-item-uid="${CSS.escape(uid)}"]`);
      const slot = document.querySelector(`[data-summary-slot="${CSS.escape(uid)}"]`);
      if (!item || !slot) return;
      const willOpen = !item.classList.contains("open");
      document.querySelectorAll(".item.open").forEach(openItem => {
        if (openItem !== item) openItem.classList.remove("open");
      });
      document.querySelectorAll(".summary-slot").forEach(openSlot => {
        if (openSlot !== slot) openSlot.innerHTML = "";
      });
      if (willOpen) {
        slot.innerHTML = renderSummary(uid);
        item.classList.add("open");
      } else {
        item.classList.remove("open");
        slot.innerHTML = "";
      }
    }

    async function init() {
      try {
        const [response, summaryResponse] = await Promise.all([
          fetch("nara_dashboard_v4.json", { cache: "no-store" }),
          fetch("nara_attachment_summaries_v4.json", { cache: "no-store" })
        ]);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        if (summaryResponse.ok) {
          const summaryData = await summaryResponse.json();
          state.summaries = summaryData.summaries || {};
        }
        state.data = data;
        state.items = data.ready_items || [];
        const summary = data.summary || {};

        document.getElementById("subtitle").textContent = `윈도우 수집·첨부·OCR 완료 후 맥에서 병합한 ${number(state.items.length)}건 후보`;
        document.getElementById("generatedAt").textContent = data.generated_at || "-";
        document.getElementById("dashboardState").textContent = data.dashboard_updated ? "대시보드 반영됨" : "대시보드 반영 전";
        document.getElementById("dashboardState").className = data.dashboard_updated ? "pill good" : "pill warn";

        renderKpis(summary);
        renderSide(data, state.items);
        populateFilters(state.items);
        applyFilters();
      } catch (error) {
        document.getElementById("subtitle").textContent = `데이터를 불러오지 못했습니다: ${error.message}`;
        document.getElementById("itemList").innerHTML = `<div class="empty">데이터 파일을 확인해주세요.</div>`;
      }
    }

    ["search", "judgeFilter", "categoryFilter", "docFilter", "sortMode"].forEach(id => {
      document.addEventListener("input", event => {
        if (event.target && event.target.id === id) applyFilters();
      });
      document.addEventListener("change", event => {
        if (event.target && event.target.id === id) applyFilters();
      });
    });

    document.addEventListener("click", event => {
      const button = event.target.closest("[data-summary-uid]");
      if (!button) return;
      toggleSummary(button.dataset.summaryUid);
    });

    init();
  </script>
</body>
</html>
